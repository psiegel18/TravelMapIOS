name: TravelMappingApp
options:
  bundleIdPrefix: com.psiegel18
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
settings:
  SWIFT_VERSION: "5.10"
  ENABLE_USER_SCRIPT_SANDBOXING: YES
  DEAD_CODE_STRIPPING: YES
  ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS: YES
  SWIFT_EMIT_LOC_STRINGS: "YES"
  LOCALIZATION_PREFERS_STRING_CATALOGS: "YES"
  LOCALIZED_STRING_SWIFTUI_SUPPORT: "YES"
  DEVELOPMENT_TEAM: ZL7GK63U5K
schemes:
  TravelMappingApp:
    build:
      targets:
        TravelMappingApp: all
        TravelMappingWidgetExtension: all
    run:
      config: Debug
    archive:
      config: Release
targets:
  TravelMappingApp:
    type: application
    platform: iOS
    sources:
      - TravelMappingApp
      - Shared
    dependencies:
      - target: TravelMappingWidgetExtension
    info:
      path: TravelMappingApp/Info.plist
      properties:
        NSSupportsLiveActivities: true
        CFBundleURLTypes:
          - CFBundleURLName: com.psiegel18.TravelMapping
            CFBundleURLSchemes:
              - travelmapping
        UIBackgroundModes:
          - location
        UILaunchScreen:
          UIImageName: LaunchIcon
          UIImageRespectsSafeAreaInsets: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSLocationWhenInUseUsageDescription: Travel Mapping uses your location to show where you are on the map relative to your traveled routes.
        NSLocationAlwaysAndWhenInUseUsageDescription: Travel Mapping needs continuous location access to record your road trip routes in the background.
        CFBundleDisplayName: Travel Mapping
    settings:
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_ENTITLEMENTS: TravelMappingApp/TravelMappingApp.entitlements
      PRODUCT_BUNDLE_IDENTIFIER: com.psiegel18.TravelMapping
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"
  TravelMappingWatch:
    type: application
    platform: watchOS
    deploymentTarget:
      watchOS: "10.0"
    sources:
      - TravelMappingWatch
    info:
      path: TravelMappingWatch/Info.plist
      properties:
        CFBundleDisplayName: Travel Mapping
    settings:
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_ENTITLEMENTS: TravelMappingWatch/TravelMappingWatch.entitlements
      PRODUCT_BUNDLE_IDENTIFIER: com.psiegel18.TravelMapping.watch
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"
  TravelMappingWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - TravelMappingWidget
      - Shared
    info:
      path: TravelMappingWidget/Info.plist
      properties:
        CFBundleDisplayName: Travel Stats
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_ENTITLEMENTS: TravelMappingWidget/TravelMappingWidgetExtension.entitlements
      PRODUCT_BUNDLE_IDENTIFIER: com.psiegel18.TravelMapping.widget
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"
